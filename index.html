<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
<title>x0s | High-Res Engine</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
  --bg: #000; --accent: #007aff; --card: #0a0a0a; --border: #1a1a1a;
  --text: #fff; --muted: #666; --font: 'Space Grotesk', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ── SEARCH HEADER ── */
.header { padding: 30px 16px 20px; background: #000; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.search-input-wrap {
  display: flex; align-items: center; gap: 12px; background: var(--card);
  border: 1px solid var(--border); padding: 16px 20px; border-radius: 18px;
}
.search-input-wrap:focus-within { border-color: var(--accent); }
input { flex: 1; background: transparent; border: none; outline: none; color: #fff; font-family: var(--font); font-size: 1.1rem; }

/* ── RESULTS ── */
.results { flex: 1; overflow-y: auto; padding: 10px 16px; }
.college-card { padding: 20px; border-bottom: 1px solid var(--border); cursor: pointer; }
.c-name { font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
.c-id { font-size: 0.7rem; color: var(--accent); font-weight: 800; text-transform: uppercase; }

/* ── VIEWER OVERLAY ── */
.viewer {
  position: fixed; inset: 0; z-index: 1000; background: #000;
  display: none; flex-direction: column; transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
}
.viewer.open { display: flex; transform: translateY(0); }
.viewer-nav { 
    padding: 15px 16px; display: flex; align-items: center; justify-content: space-between; 
    border-bottom: 1px solid var(--border); background: #000; z-index: 10;
}
.btn-close { width: 40px; height: 40px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #fff; }

/* ── HIGH-RES SCROLL AREA ── */
.pdf-scroll-wrap { 
    flex: 1; 
    overflow: auto; /* Native manual panning */
    background: #050505; 
    display: flex; 
    justify-content: center; 
    align-items: flex-start;
    -webkit-overflow-scrolling: touch; 
}
canvas { 
    background: #fff; 
    margin: 20px auto; 
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    max-width: 95%; /* Fits width by default, pan vertically */
    height: auto;
}

/* ── LOADER ── */
#loader { 
  position: fixed; inset: 0; background: #000; z-index: 1100; 
  display: none; flex-direction: column; align-items: center; justify-content: center; 
}
.spinner { width: 24px; height: 24px; border: 2px solid rgba(0,122,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 15px; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <div style="font-size: 0.65rem; color: var(--accent); letter-spacing: 0.3em; font-weight: 700;">CALIBRATING RESOLUTION</div>
</div>

<div class="header">
  <div class="search-input-wrap">
    <i class="fa-solid fa-magnifying-glass" style="color: var(--muted);"></i>
    <input type="text" id="mainInput" placeholder="Search Colleges..." oninput="runSearch(this.value)">
  </div>
</div>

<div class="results" id="resArea"></div>

<div class="viewer" id="viewer">
  <div class="viewer-nav">
    <div class="btn-close" onclick="closeViewer()"><i class="fa-solid fa-xmark"></i></div>
    <div style="font-size:0.75rem; font-weight:600;" id="vTitle">...</div>
    <div style="width:40px"></div>
  </div>
  <div class="pdf-scroll-wrap" id="pdfArea"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>
const PDF_URL = 'Cutoff.pdf';
const pdfjsLib = window['pdfjs-dist/build/pdf'];
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

function runSearch(val) {
  const q = val.toLowerCase().trim();
  const area = document.getElementById('resArea');
  if(!q) { area.innerHTML = ''; return; }
  const matches = (window.XOS_COLLEGES || []).filter(c => c.name.toLowerCase().includes(q) || q === '#college');
  area.innerHTML = matches.map(c => `
    <div class="college-card" onclick="processPDF('${c.name.split(',')[0].trim()}')">
      <div class="c-id">${c.id}</div>
      <div class="c-name">${c.name}</div>
    </div>
  `).join('');
}

async function processPDF(name) {
  const loader = document.getElementById('loader');
  const viewer = document.getElementById('viewer');
  const area = document.getElementById('pdfArea');
  const title = document.getElementById('vTitle');
  
  loader.style.display = 'flex';
  title.textContent = name;
  area.innerHTML = ''; 

  try {
    const pdf = await pdfjsLib.getDocument(PDF_URL).promise;
    let foundPageNum = 1;

    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const textContent = await page.getTextContent();
      const text = textContent.items.map(item => item.str).join(' ');
      if (text.toLowerCase().includes(name.toLowerCase())) {
        foundPageNum = i;
        break;
      }
    }

    const page = await pdf.getPage(foundPageNum);
    
    // CRITICAL: High-Res Rendering
    // We render at scale 3.0 to keep text crisp on zoom
    const scale = 3.0; 
    const viewport = page.getViewport({ scale: scale });
    const canvas = document.createElement('canvas');
    const context = canvas.getContext('2d');
    
    canvas.height = viewport.height;
    canvas.width = viewport.width;

    const renderContext = {
      canvasContext: context,
      viewport: viewport,
      enableWebGL: true // Faster rendering
    };

    await page.render(renderContext).promise;
    area.appendChild(canvas);

    viewer.style.display = 'flex';
    setTimeout(() => viewer.classList.add('open'), 10);
  } catch (e) {
    console.error(e);
  } finally {
    loader.style.display = 'none';
  }
  history.pushState({view: 'pdf'}, '');
}

function closeViewer() {
  const v = document.getElementById('viewer');
  v.classList.remove('open');
  setTimeout(() => v.style.display = 'none', 450);
}

window.addEventListener('popstate', closeViewer);
</script>

<script src="colleges.js"></script>
</body>
</html>
